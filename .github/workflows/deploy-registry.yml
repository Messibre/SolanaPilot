name: Deploy Registry Program to Devnet

# === REQUIRED GITHUB SECRETS ===
# DEPLOYER_KEYPAIR  : base64 of ~/.config/solana/id.json (devnet funded wallet)
# PROGRAM_KEYPAIR   : base64 of target/deploy/solanapilot_registry-keypair.json
#
# To generate:
#   base64 -w0 ~/.config/solana/id.json > deployer.b64
#   base64 -w0 target/deploy/solanapilot_registry-keypair.json > program.b64

on:
  push:
    branches:
      - main
      - deploy
  workflow_dispatch:

env:
  CARGO_NET_OFFLINE: false
  RUST_BACKTRACE: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare keypair files
        run: |
          set -euo pipefail
          mkdir -p .ci-keypair
          echo "${{ secrets.DEPLOYER_KEYPAIR }}" | base64 -d > .ci-keypair/id.json
          echo "${{ secrets.PROGRAM_KEYPAIR }}" | base64 -d > .ci-keypair/solanapilot_registry-keypair.json
          chmod 600 .ci-keypair/id.json .ci-keypair/solanapilot_registry-keypair.json

      - name: Build CI Docker image
        run: |
          set -euo pipefail
          docker build -t solanapilot-ci:latest -f ci/Dockerfile .

      - name: Run build and deploy inside container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v "$GITHUB_WORKSPACE/.ci-keypair:/keypair:ro" \
            -w /workspace \
            solanapilot-ci:latest /bin/bash -lc "set -euo pipefail; \
              export HOME=/root; \
              command -v solana; \
              command -v anchor; \
              mkdir -p ~/.config/solana; \
              cp /keypair/id.json ~/.config/solana/id.json; \
              chmod 600 ~/.config/solana/id.json; \
              mkdir -p target/deploy; \
              cp /keypair/solanapilot_registry-keypair.json target/deploy/solanapilot_registry-keypair.json; \
              chmod 600 target/deploy/solanapilot_registry-keypair.json; \
              solana config set --url devnet --keypair ~/.config/solana/id.json; \
              echo \"💰 Requesting devnet SOL...\"; \
              for i in 1 2 3 4 5; do \
                solana airdrop 2 --url devnet && break; \
                echo \"Airdrop attempt $i failed. Waiting 15s...\"; \
                sleep 15; \
              done; \
              BALANCE=$(solana balance --url devnet | grep -oP '[\\d.]+' | head -n1); \
              echo \"Wallet balance: ${BALANCE:-0} SOL\"; \
              if [ -z \"${BALANCE:-}\" ] || [ \"$BALANCE\" = \"0\" ] || [ \"$BALANCE\" = \"0.0\" ]; then \
                echo \"::error::Airdrop failed after 5 attempts. Cannot deploy.\"; \
                exit 1; \
              fi; \
              anchor build --program-name solanapilot_registry || { echo \"::error::Build failed\"; exit 1; }; \
              anchor deploy --program-name solanapilot_registry || { echo \"::error::Deploy failed. Check wallet balance and keypair alignment.\"; exit 1; }; \
              PROGRAM_ID=$(solana-keygen pubkey target/deploy/solanapilot_registry-keypair.json); \
              DEPLOYER=$(solana-keygen pubkey ~/.config/solana/id.json); \
              echo \"$PROGRAM_ID\" > /workspace/.ci-program-id; \
              echo \"$DEPLOYER\" > /workspace/.ci-deployer; \
            "

      - name: Capture deployment metadata
        run: |
          set -euo pipefail
          PROGRAM_ID=$(cat .ci-program-id)
          DEPLOYER_KEY=$(cat .ci-deployer)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "DEPLOYER_KEY=$DEPLOYER_KEY" >> $GITHUB_ENV

      - name: Verify deployment
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v "$GITHUB_WORKSPACE/.ci-keypair:/keypair:ro" \
            -w /workspace \
            solanapilot-ci:latest /bin/bash -lc "set -euo pipefail; \
              export HOME=/root; \
              mkdir -p ~/.config/solana; \
              cp /keypair/id.json ~/.config/solana/id.json; \
              chmod 600 ~/.config/solana/id.json; \
              solana config set --url devnet --keypair ~/.config/solana/id.json; \
              solana program show '${{ env.PROGRAM_ID }}' --url devnet || echo 'Program not yet visible (may take a few seconds)'; \
            "

      - name: Deployment Summary
        run: |
          set -euo pipefail
          echo "::notice::✅ Registry deployed to devnet"
          echo "Program ID: ${{ env.PROGRAM_ID }}"
          echo "Deployer Address: ${{ env.DEPLOYER_KEY }}"
          echo "Explorer: https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=devnet"

      - name: Comment on PR (if pull request)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const programId = '${{ env.PROGRAM_ID }}';
            const deployer = '${{ env.DEPLOYER_KEY }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Registry Program Deployment Succeeded**\n\n` +
                    `**Program ID:** \`${programId}\`\n` +
                    `**Deployer:** \`${deployer}\`\n` +
                    `**Network:** Devnet\n` +
                    `**Program Explorer:** https://explorer.solana.com/address/${programId}?cluster=devnet\n` +
                    `**Workflow:** [View Run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-output
          path: |
            target/deploy/
            target/idl/
            .ci-program-id
            .ci-deployer
          retention-days: 7
