name: Deploy Registry Program to Devnet

on:
  push:
    branches:
      - main
      - deploy
  workflow_dispatch:

env:
  CARGO_NET_OFFLINE: false
  RUST_BACKTRACE: 1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config openssl libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build CI Docker image
        run: |
          docker build -t solanapilot-ci:latest -f ci/Dockerfile .

      - name: Run build and deploy inside container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            solanapilot-ci:latest /bin/bash -lc "set -euo pipefail; \
              export HOME=/root; \
              solana --version || true; \
              anchor --version || true; \
              solana config set --url https://api.devnet.solana.com; \
              mkdir -p ~/.config/solana; \
              solana-keygen new --outfile ~/.config/solana/id.json --force --no-passphrase; \
              solana address > /workspace/.deployer_addr || true; \
              cd programs/registry; \
              anchor build --program-name solanapilot_registry; \
              anchor deploy --program-name solanapilot_registry --provider.cluster devnet || true; \
              echo \"Deployment attempted\"; \
            "

      - name: Capture deployer address
        run: |
          if [ -f .deployer_addr ]; then
            DEPL=$(cat .deployer_addr); echo "DEPLOYER_KEY=$DEPL" >> $GITHUB_ENV
          fi

      - name: Verify Deployment (inside container)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            solanapilot-ci:latest /bin/bash -lc "set -euo pipefail; \
              PROGRAM_ID=\"Xo7TcdZwXZwU2S4em9r8Gn1L5L9ppmkqFLBpCXcuSPs\"; \
              echo \"Checking program at: $PROGRAM_ID\"; \
              solana program show $PROGRAM_ID --url devnet || echo \"Program not yet visible\"; \
            "

      - name: Output Results
        run: |
          echo "=== Deployment Summary ==="
          echo "Registry Program ID: Xo7TcdZwXZwU2S4em9r8Gn1L5L9ppmkqFLBpCXcuSPs"
          echo "Deployer Address: ${{ env.DEPLOYER_KEY }}"
          echo "Network: devnet"
          echo "Cluster URL: https://api.devnet.solana.com"
          echo ""
          echo "To verify on-chain:"
          echo "  solana program show Xo7TcdZwXZwU2S4em9r8Gn1L5L9ppmkqFLBpCXcuSPs --url devnet"

      - name: Comment on PR (if pull request)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Registry Program Deployment Workflow Triggered**\n\n` +
                    `**Program ID:** \`Xo7TcdZwXZwU2S4em9r8Gn1L5L9ppmkqFLBpCXcuSPs\`\n` +
                    `**Network:** Devnet\n` +
                    `**Workflow:** [View Run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-output
          path: target/sbf-solana-solana/release/
          retention-days: 7
