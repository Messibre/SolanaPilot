<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚡ SolanaPilot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #1a1a2e;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─────────────────────── HEADER ────────────────────── */
      .header {
        background: #16213e;
        border-bottom: 1px solid #9945ff30;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .header-subtitle {
        font-size: 12px;
        color: #a0aec0;
        margin-left: 8px;
      }

      .devnet-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        background: #10b98130;
        color: #6ee7b7;
        padding: 4px 8px;
        border-radius: 12px;
        font-weight: 500;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        background: #10b981;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ─────────────────────── MESSAGES AREA ────────────────────── */
      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .welcome-card {
        background: linear-gradient(135deg, #9945ff20 0%, #16213e 100%);
        border: 1px solid #9945ff40;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        margin: auto 0;
      }

      .welcome-card h2 {
        font-size: 18px;
        margin-bottom: 12px;
        color: #9945ff;
      }

      .welcome-card p {
        font-size: 13px;
        color: #cbd5e0;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      .quick-chips {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chip {
        background: #16213e;
        border: 1px solid #9945ff40;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 12px;
        color: #cbd5e0;
        transition: all 0.2s;
      }

      .chip:hover {
        border-color: #9945ff;
        color: #9945ff;
      }

      /* ─────────────────────── MESSAGE BUBBLES ────────────────────── */
      .message {
        display: flex;
        gap: 8px;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.assistant {
        justify-content: flex-start;
      }

      .avatar {
        font-size: 16px;
        min-width: 24px;
        text-align: center;
        margin-top: 4px;
      }

      .bubble {
        max-width: 75%;
        padding: 12px;
        border-radius: 8px;
        word-wrap: break-word;
        line-height: 1.5;
      }

      .user .bubble {
        background: #9945ff20;
        border: 1px solid #9945ff40;
        color: #e2e8f0;
      }

      .assistant .bubble {
        background: #16213e;
        border: 1px solid #16213e;
        color: #cbd5e0;
      }

      .timestamp {
        font-size: 11px;
        color: #718096;
        margin-top: 4px;
        display: block;
      }

      /* ─────────────────────── CODE BLOCKS ────────────────────── */
      .code-block {
        background: #0f172a;
        border-left: 3px solid #9945ff;
        border-radius: 4px;
        padding: 12px;
        margin: 8px 0;
        font-family: "Fira Code", "Cascadia Code", monospace;
        font-size: 12px;
        overflow-x: auto;
        position: relative;
      }

      .code-block code {
        color: #94e2d5;
        display: block;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .code-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 4px;
      }

      .code-btn {
        background: #9945ff;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.2s;
        font-weight: 500;
      }

      .code-btn:hover {
        background: #8337d9;
      }

      /* ─────────────────────── LOADING STATE ────────────────────── */
      .loading {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #cbd5e0;
        padding: 12px;
      }

      .spinner {
        display: flex;
        gap: 3px;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: #9945ff;
        border-radius: 50%;
        animation: bounce 1.4s infinite;
      }

      .dot:nth-child(1) {
        animation-delay: 0s;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        40% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }

      .error-message {
        background: #dc262630;
        border: 1px solid #dc2626;
        color: #fca5a5;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
      }

      .success-toast {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #10b981;
        color: white;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 12px;
        animation: slideUp 0.3s ease-out;
        z-index: 1000;
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* ─────────────────────── INPUT AREA ────────────────────── */
      .input-area {
        background: #16213e;
        border-top: 1px solid #9945ff30;
        padding: 12px;
        flex-shrink: 0;
        display: flex;
        gap: 8px;
      }

      .input-wrapper {
        flex: 1;
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }

      textarea {
        flex: 1;
        background: #0f172a;
        border: 1px solid #9945ff40;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 10px 12px;
        font-family: inherit;
        font-size: 13px;
        resize: none;
        max-height: 100px;
        min-height: 40px;
        outline: none;
        transition: border-color 0.2s;
      }

      textarea:focus {
        border-color: #9945ff;
      }

      textarea::placeholder {
        color: #718096;
      }

      .send-btn {
        background: #9945ff;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s;
        white-space: nowrap;
        height: 40px;
      }

      .send-btn:hover:not(:disabled) {
        background: #8337d9;
      }

      .send-btn:disabled {
        background: #4a5568;
        cursor: not-allowed;
        opacity: 0.6;
      }

      /* ─────────────────────── SCROLLBAR ────────────────────── */
      .messages-container::-webkit-scrollbar {
        width: 8px;
      }

      .messages-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .messages-container::-webkit-scrollbar-thumb {
        background: #9945ff40;
        border-radius: 4px;
      }

      .messages-container::-webkit-scrollbar-thumb:hover {
        background: #9945ff60;
      }

      /* ─────────────────────── MARKDOWN STYLING ────────────────────── */
      .bubble strong {
        color: #9945ff;
        font-weight: 600;
      }

      .bubble em {
        color: #a0aec0;
      }

      .bubble p {
        margin: 8px 0;
      }

      .bubble ul,
      .bubble ol {
        margin: 8px 0 8px 20px;
      }

      .bubble li {
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-size: 18px">⚡</span>
        <div>
          <div class="header-title">SolanaPilot</div>
          <div class="header-subtitle">Solana AI Copilot</div>
        </div>
      </div>
      <div class="devnet-badge">
        <span class="badge-dot"></span>
        devnet
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
      <div class="welcome-card">
        <h2>⚡ SolanaPilot Ready</h2>
        <p>
          Ask me anything about Solana development.<br /><br />
          I understand PDAs, Anchor constraints, security best practices,<br />
          and can help debug your code.
        </p>
        <div class="quick-chips">
          <button class="chip" onclick="fillChip('🔑 Explain PDAs')">
            🔑 Explain PDAs
          </button>
          <button class="chip" onclick="fillChip('🛡️ Security tips')">
            🛡️ Security tips
          </button>
          <button class="chip" onclick="fillChip('⚓ Anchor basics')">
            ⚓ Anchor basics
          </button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Ask about Solana development..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          Send
        </button>
      </div>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      const messagesContainer = document.getElementById("messagesContainer");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      let isLoading = false;

      // ────────────────────────────────────────────────────────
      // Auto-resize textarea
      // ────────────────────────────────────────────────────────
      userInput.addEventListener("input", () => {
        userInput.style.height = "auto";
        userInput.style.height = Math.min(userInput.scrollHeight, 100) + "px";
      });

      // ────────────────────────────────────────────────────────
      // Send message on Enter (Shift+Enter for newline)
      // ────────────────────────────────────────────────────────
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // ────────────────────────────────────────────────────────
      // Send message
      // ────────────────────────────────────────────────────────
      function sendMessage() {
        const message = userInput.value.trim();
        if (!message || isLoading) return;

        // Add user message to UI
        addMessage(message, "user");

        // Clear input
        userInput.value = "";
        userInput.style.height = "auto";

        // Disable send button and show loading
        setLoading(true);

        // Send to extension
        vscode.postMessage({
          type: "ask",
          text: message,
        });
      }

      // ────────────────────────────────────────────────────────
      // Handle quick chips
      // ────────────────────────────────────────────────────────
      function fillChip(text) {
        userInput.value = text;
        userInput.focus();
        userInput.style.height = "auto";
        userInput.style.height = Math.min(userInput.scrollHeight, 100) + "px";
      }

      // ────────────────────────────────────────────────────────
      // Add message to UI
      // ────────────────────────────────────────────────────────
      function addMessage(content, role) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "👤" : "⚡";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = parseMarkdown(content);

        const timestamp = document.createElement("span");
        timestamp.className = "timestamp";
        timestamp.textContent = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });

        msgDiv.appendChild(avatar);
        const contentWrapper = document.createElement("div");
        contentWrapper.appendChild(bubble);
        contentWrapper.appendChild(timestamp);
        msgDiv.appendChild(contentWrapper);

        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      // ────────────────────────────────────────────────────────
      // Parse markdown (basic)
      // ────────────────────────────────────────────────────────
      function parseMarkdown(text) {
        // Escape HTML
        let html = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        // Code blocks (triple backticks)
        html = html.replace(
          /```(\w+)?\n([\s\S]*?)```/g,
          (match, lang, code) => {
            const escapedCode = code
              .trim()
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            const uuid = Math.random().toString(36).substring(7);
            return `<div class="code-block" data-code="${escapedCode.replace(/"/g, "&quot;")}">\
                    <div class="code-actions">\
                        <button class="code-btn" onclick="copyCode('${uuid}')">Copy</button>\
                        <button class="code-btn" onclick="insertCode('${uuid}')">📋 Insert</button>\
                    </div>\
                    <code id="code-${uuid}">${escapedCode}</code>\
                </div>`;
          },
        );

        // Inline code (single backticks)
        html = html.replace(
          /`([^`]+)`/g,
          '<code style="background: #0f172a; color: #94e2d5; padding: 2px 4px; border-radius: 2px;">$1</code>',
        );

        // Bold
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/__(.+?)__/g, "<strong>$1</strong>");

        // Italic
        html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
        html = html.replace(/_(.+?)_/g, "<em>$1</em>");

        // Paragraphs
        html = html
          .split("\n")
          .map((line) => (line.trim() ? `<p>${line}</p>` : ""))
          .join("");

        // Lists (simple)
        html = html.replace(
          /<p>- (.+?)<\/p>/g,
          '<li style="margin-left: 20px;">$1</li>',
        );

        return html;
      }

      // ────────────────────────────────────────────────────────
      // Copy code
      // ────────────────────────────────────────────────────────
      function copyCode(uuid) {
        const codeElement = document.getElementById(`code-${uuid}`);
        if (codeElement) {
          const text = codeElement.textContent;
          navigator.clipboard.writeText(text).then(() => {
            showToast("✅ Copied to clipboard!");
          });
        }
      }

      // ────────────────────────────────────────────────────────
      // Insert code into editor
      // ────────────────────────────────────────────────────────
      function insertCode(uuid) {
        const codeElement = document.getElementById(`code-${uuid}`);
        if (codeElement) {
          const code = codeElement.textContent;
          vscode.postMessage({
            type: "insertCode",
            code: code,
          });
        }
      }

      // ────────────────────────────────────────────────────────
      // Show toast
      // ────────────────────────────────────────────────────────
      function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "success-toast";
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      // ────────────────────────────────────────────────────────
      // Set loading state
      // ────────────────────────────────────────────────────────
      function setLoading(loading) {
        isLoading = loading;
        sendBtn.disabled = loading;
        userInput.disabled = loading;

        if (loading) {
          const loadingDiv = document.createElement("div");
          loadingDiv.className = "message assistant";
          loadingDiv.id = "loading-indicator";

          const avatar = document.createElement("div");
          avatar.className = "avatar";
          avatar.textContent = "⚡";

          const loading = document.createElement("div");
          loading.className = "loading";
          loading.innerHTML =
            '<div class="spinner"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> SolanaPilot is thinking...';

          loadingDiv.appendChild(avatar);
          loadingDiv.appendChild(loading);
          messagesContainer.appendChild(loadingDiv);
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        } else {
          const loadingIndicator = document.getElementById("loading-indicator");
          if (loadingIndicator) {
            loadingIndicator.remove();
          }
        }
      }

      // ────────────────────────────────────────────────────────
      // Receive messages from extension
      // ────────────────────────────────────────────────────────
      window.addEventListener("message", (event) => {
        const message = event.data;

        if (message.type === "thinking") {
          setLoading(true);
        } else if (message.type === "response") {
          setLoading(false);
          addMessage(message.text, "assistant");
        } else if (message.type === "error") {
          setLoading(false);
          const errorDiv = document.createElement("div");
          errorDiv.className = "error-message";
          errorDiv.textContent = "❌ " + message.text;
          messagesContainer.appendChild(errorDiv);
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        } else if (message.type === "insertCode") {
          showToast("✅ Code inserted into editor!");
        }
      });
    </script>
  </body>
</html>
